name: Build Aelita-Fon Debug APK

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  build-debug-apk:
    name: Build debug APK artifact
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.14.4'

      - name: Repository diagnostics
        run: |
          echo "Java version:"
          java -version
          echo "Gradle version:"
          gradle --version
          echo "Android SDK root: ${ANDROID_SDK_ROOT:-<unset>}"
          echo "Repository root files:"
          find . -maxdepth 1 -mindepth 1 -print | sort
          echo "App directory files:"
          find app -maxdepth 2 -mindepth 1 -print | sort

      - name: Install Android SDK components
        run: |
          yes | sdkmanager --licenses
          sdkmanager \
            "platform-tools" \
            "platforms;android-36" \
            "build-tools;36.0.0"

      - name: Gradle dependency diagnostics
        run: |
          gradle projects --stacktrace
          gradle :app:dependencies --configuration debugRuntimeClasspath --stacktrace

      - name: Build debug APK
        run: gradle :app:assembleDebug --stacktrace --info

      - name: Discover APK outputs
        if: always()
        run: find app/build/outputs -type f || true

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Aelita-Fon-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 7
